<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天 - 前任AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="chat">
    <div class="chat-container">
        <!-- 聊天头部 -->
        <header class="chat-header">
            <button class="back-btn" onclick="goBack()">←</button>
            
            <div class="chat-header-info">
                <div class="chat-avatar" id="chatAvatar">💔</div>
                <div class="chat-meta">
                    <div class="chat-name" id="chatTitle">前任</div>
                    <div class="chat-status">在线</div>
                </div>
            </div>
            
            <div class="chat-actions">
                <button class="chat-action-btn" onclick="clearChat()" title="清空记录">🗑️</button>
            </div>
        </header>

        <!-- 快速回复 -->
        <div class="quick-replies">
            <span class="quick-reply-chip" onclick="quickReply('在干嘛呢？')">在干嘛呢？</span>
            <span class="quick-reply-chip" onclick="quickReply('最近好吗？')">最近好吗？</span>
            <span class="quick-reply-chip" onclick="quickReply('我想你了')">我想你了</span>
            <span class="quick-reply-chip" onclick="quickReply('还记得我们以前...')">还记得以前...</span>
            <span class="quick-reply-chip" onclick="quickReply('你变了')">你变了</span>
        </div>

        <!-- 消息列表 -->
        <div class="chat-messages" id="chatMessages">
            <div class="system-message">
                <span id="chatWelcomeMsg">✨ 终于等到你了</span>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="输入消息..."
                        rows="1"
                    ></textarea>
                </div>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 聊天页面伤感欢迎语
        const chatWelcomeQuotes = [
            "✨ 终于等到你了",
            "💭 好久不见",
            "🌙 你还好吗",
            "💔 我一直在想你",
            "📝 有很多话想对你说",
            "🍂 时间过得好快",
            "🌸 还记得我们第一次见面吗",
            "💫 你变了，又好像没变"
        ];
        
        // 随机显示欢迎语
        const welcomeMsg = document.getElementById('chatWelcomeMsg');
        if (welcomeMsg) {
            welcomeMsg.textContent = chatWelcomeQuotes[Math.floor(Math.random() * chatWelcomeQuotes.length)];
        }
        
        // 回车发送，Shift+回车换行
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // 自动调整高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
