<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天 - 前任AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="chat-container">
        <!-- 聊天头部 -->
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="chat-info">
                <div class="chat-avatar" id="chatAvatar">💔</div>
                <div class="chat-name">
                    <span id="chatTitle">前任</span>
                    <small id="chatStatus">在线</small>
                </div>
            </div>
            <button class="menu-btn" onclick="clearChat()">🗑️</button>
        </div>
        
        <!-- 聊天消息区 -->
        <div class="chat-messages" id="chatMessages">
            <div class="system-message">
                <span>开始和TA的对话吧</span>
            </div>
        </div>
        
        <!-- 输入区 -->
        <div class="chat-input-area">
            <button class="input-btn" onclick="quickReply()">⚡</button>
            <div class="input-container">
                <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initChat();
            
            // 回车发送
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 自动调整输入框高度
            document.getElementById('messageInput').addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        });
    </script>
</body>
</html>
