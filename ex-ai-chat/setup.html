<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色设定 - 前任AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h2>角色设定</h2>
        </div>
        
        <div class="form-container">
            <!-- 照片上传 -->
            <div class="form-group">
                <label>TA的照片</label>
                <div class="photo-upload" onclick="selectPhoto()">
                    <div id="photoPreview" class="photo-preview">
                        <span>📷 点击选择照片</span>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" style="display: none" onchange="handlePhoto(event)">
                </div>
            </div>
            
            <!-- 称呼 -->
            <div class="form-group">
                <label>怎么称呼TA</label>
                <input type="text" id="exName" placeholder="比如：宝贝、亲爱的、小明">
            </div>
            
            <!-- 聊天记录导入 -->
            <div class="form-group">
                <label>导入聊天记录</label>
                <div class="file-upload" onclick="selectChatLog()">
                    <span id="chatLogName">📄 点击选择txt文件</span>
                    <input type="file" id="chatLogInput" accept=".txt" style="display: none" onchange="handleChatLog(event)">
                </div>
                <small>支持微信/QQ导出的txt格式</small>
            </div>
            
            <!-- 手动描述 -->
            <div class="form-group">
                <label>TA的性格特点</label>
                <textarea id="personality" rows="3" placeholder="比如：温柔体贴、有点傲娇、外冷内热..."></textarea>
            </div>
            
            <div class="form-group">
                <label>说话风格</label>
                <textarea id="speakingStyle" rows="3" placeholder="比如：喜欢用"宝"结尾、爱发emoji、打字很快..."></textarea>
            </div>
            
            <div class="form-group">
                <label>口头禅</label>
                <input type="text" id="catchphrase" placeholder="比如：你知道吗、我觉得吧、哈哈哈">
            </div>
            
            <div class="form-group">
                <label>共同回忆/故事</label>
                <textarea id="memories" rows="4" placeholder="比如：第一次见面的地方、一起养过的宠物、特别的纪念日..."></textarea>
            </div>
            
            <div class="form-group">
                <label>分手原因/现状</label>
                <textarea id="breakup" rows="2" placeholder="比如：和平分手、异地分开、还有联系..."></textarea>
            </div>
            
            <button class="btn btn-primary btn-large" onclick="savePersona()">
                生成人设
            </button>
            
            <div class="preview-section" id="promptPreview" style="display: none;">
                <h3>生成的人设Prompt</h3>
                <div class="prompt-box" id="generatedPrompt"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadPersonaToForm();
        });
    </script>
</body>
</html>
