<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>前任AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="welcome-screen">
            <div class="logo">
                <div class="avatar-placeholder" id="mainAvatar">💔</div>
                <h1>前任AI</h1>
                <p class="subtitle">和过去的TA继续对话</p>
            </div>
            
            <div class="menu-buttons">
                <button class="btn btn-primary" onclick="goToConfig()">
                    <span class="icon">⚙️</span>
                    API配置
                </button>
                <button class="btn btn-secondary" onclick="goToSetup()">
                    <span class="icon">👤</span>
                    角色设定
                </button>
                <button class="btn btn-primary" onclick="goToChat()">
                    <span class="icon">💬</span>
                    开始对话
                </button>
            </div>
            
            <div class="status-bar">
                <div id="apiStatus" class="status-dot red"></div>
                <span id="statusText">未配置API</span>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 检查配置状态
        document.addEventListener('DOMContentLoaded', function() {
            checkConfigStatus();
        });
    </script>
</body>
</html>
